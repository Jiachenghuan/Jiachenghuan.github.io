<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      (function () {
        var path = window.location.pathname;
        var query = window.location.search;
        var hash = window.location.hash;
        var redirect = '/?p=' + encodeURIComponent(path + query + hash);
        window.location.replace(redirect);
      })();
    </script>
  </head>
  <body></body>
</html>
